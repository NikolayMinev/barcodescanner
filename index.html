<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баркод / QR Скенер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;min-height:100vh;padding:1rem}
h1{font-size:20px;font-weight:500;margin-bottom:1rem;text-align:center}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1rem;margin-bottom:1rem}
.scan-area{position:relative;width:100%;max-width:500px;margin:0 auto;border-radius:8px;overflow:hidden;background:#000}
video{width:100%;display:block}
canvas#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.slot-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:#fff;font-size:13px;padding:4px 14px;border-radius:20px;white-space:nowrap;z-index:2}
.dot{position:absolute;top:10px;right:10px;width:12px;height:12px;border-radius:50%;background:#e24b4a;z-index:2}
.dot.on{background:#4caf50;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.controls{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap}
button{flex:1;min-width:110px;padding:10px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;font-size:14px;cursor:pointer}
button:hover{background:#f0f0f0}
button:active{transform:scale(.98)}
button.green{background:#1D9E75;color:#fff;border-color:#1D9E75}
button.green:hover{background:#0F6E56}
button.red{background:#e24b4a;color:#fff;border-color:#e24b4a}
button:disabled{opacity:.4;cursor:not-allowed}
.slots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
.slot{padding:.75rem;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;min-height:60px}
.slot.ok{border-color:#1D9E75;background:#f0fdf8}
.stitle{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.sval{font-size:13px;font-weight:500;word-break:break-all}
.sval.empty{color:#bbb;font-weight:400;font-style:italic}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.rhead h2{font-size:15px;font-weight:500}
.badge{background:#e6f1fb;color:#185FA5;font-size:12px;padding:2px 10px;border-radius:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;color:#666;border-bottom:1px solid #eee;font-weight:500}
td{padding:7px 8px;border-bottom:1px solid #eee;word-break:break-all}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f9f9}
.empty-msg{text-align:center;padding:2rem;color:#bbb;font-size:13px}
.sb{font-size:13px;padding:8px 12px;border-radius:8px;margin-top:.75rem;text-align:center;display:none}
.sb.info{background:#e6f1fb;color:#185FA5}
.sb.ok{background:#e8f5e9;color:#2e7d32}
.sb.err{background:#ffebee;color:#c62828}
select{width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#222;font-size:13px;margin-top:.75rem;display:none}
</style>
</head>
<body>
<h1>📷 Баркод / QR Скенер</h1>

<div class="card">
  <div class="scan-area" id="scanWrap">
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="slot-label" id="lbl">Натисни Старт</div>
    <div class="dot" id="dot"></div>
  </div>
  <div class="sb" id="sb"></div>
  <div class="controls">
    <button class="green" id="btnStart" onclick="startCam()">▶ Старт</button>
    <button id="btnStop" onclick="stopCam()" disabled>■ Спри</button>
  </div>
  <select id="camSel" onchange="switchCam()"></select>
</div>

<div class="card">
  <div class="slots">
    <div class="slot" id="s1"><div class="stitle">Код 1</div><div class="sval empty" id="v1">Очаква се...</div></div>
    <div class="slot" id="s2"><div class="stitle">Код 2</div><div class="sval empty" id="v2">Очаква се...</div></div>
  </div>
  <div class="controls">
    <button onclick="resetSlots()">↺ Нулирай</button>
    <button class="green" id="btnSave" onclick="savePair()" disabled>+ Запиши двойката</button>
  </div>
</div>

<div class="card">
  <div class="rhead"><h2>Записи</h2><span class="badge" id="cnt">0</span></div>
  <div class="empty-msg" id="noRec">Няма записи все още</div>
  <table id="tbl" style="display:none">
    <thead><tr><th>#</th><th>Код 1</th><th>Код 2</th><th>Дата и час</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="controls" style="margin-top:.75rem">
    <button onclick="dlCSV()">⬇ Изтегли CSV</button>
    <button class="red" onclick="clearAll()">🗑 Изчисти</button>
  </div>
</div>

<!-- jsQR за QR кодове (fallback когато BarcodeDetector не е наличен) -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
var video = document.getElementById('video');
var overlayCanvas = document.getElementById('overlay');
var octx = overlayCanvas.getContext('2d');
var detector = null;
var useNative = false;
var useJsQR = false;
var scanning = false;
var rafId = null;
var slot1 = null, slot2 = null, curSlot = 1;
var records = [];
var lastCode = '';
var lastTime = 0;

// Инициализация на детектор
function initDetector() {
  if (window.BarcodeDetector) {
    try {
      detector = new BarcodeDetector({
        formats: ['qr_code','ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','codabar','data_matrix','aztec','pdf417']
      });
      useNative = true;
      return;
    } catch(e) {}
  }
  if (window.jsQR) { useJsQR = true; }
}

function status(msg, type) {
  var el = document.getElementById('sb');
  el.textContent = msg; el.className = 'sb ' + (type||'info'); el.style.display = 'block';
  if (type === 'ok') setTimeout(function(){ el.style.display='none'; }, 2500);
}

async function startCam() {
  initDetector();
  if (!useNative && !useJsQR) {
    status('Браузърът не поддържа сканиране. Използвай Chrome на Android или Safari 17+.', 'err');
    return;
  }
  try {
    status('Зарежда камерата...', 'info');
    var devices = [];
    try {
      await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
        .then(function(s){ s.getTracks().forEach(function(t){t.stop();}); });
      var all = await navigator.mediaDevices.enumerateDevices();
      devices = all.filter(function(d){ return d.kind==='videoinput'; });
    } catch(e) {}

    var sel = document.getElementById('camSel');
    sel.innerHTML = '';
    devices.forEach(function(d,i){
      var o = document.createElement('option');
      o.value = d.deviceId;
      o.text = d.label || ('Камера '+(i+1));
      sel.appendChild(o);
    });
    if (devices.length > 1) sel.style.display = 'block';

    var back = devices.find(function(d){ return /back|rear|environment/i.test(d.label); });
    var devId = back ? back.deviceId : (devices[0] ? devices[0].deviceId : null);
    if (devId) sel.value = devId;

    await openStream(devId);
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('dot').classList.add('on');
    document.getElementById('lbl').textContent = 'Сканирай Код 1';
    status('Камерата е активна' + (useNative ? ' (Native)' : ' (jsQR)'), 'info');
  } catch(e) {
    status('Грешка: ' + e.message, 'err');
  }
}

async function openStream(deviceId) {
  if (video.srcObject) { video.srcObject.getTracks().forEach(function(t){t.stop();}); }
  var constraints = deviceId
    ? { video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } }
    : { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
  var stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;
  await new Promise(function(res){ video.onloadedmetadata = res; });
  video.play();
  scanning = true;
  scan();
}

// Скрит canvas за обработка на кадри
var procCanvas = document.createElement('canvas');
var pctx = procCanvas.getContext('2d');

function scan() {
  if (!scanning) return;
  if (video.readyState < 2) { rafId = requestAnimationFrame(scan); return; }

  var w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) { rafId = requestAnimationFrame(scan); return; }

  procCanvas.width = w; procCanvas.height = h;
  pctx.drawImage(video, 0, 0, w, h);

  // Синхронизиране на overlay canvas
  overlayCanvas.width = overlayCanvas.offsetWidth;
  overlayCanvas.height = overlayCanvas.offsetHeight;
  octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  // Рамка за насочване
  var cx = overlayCanvas.width/2, cy = overlayCanvas.height/2;
  var bw = overlayCanvas.width*0.65, bh = overlayCanvas.height*0.55;
  octx.strokeStyle = 'rgba(255,255,255,0.75)';
  octx.lineWidth = 2;
  octx.strokeRect(cx-bw/2, cy-bh/2, bw, bh);

  if (useNative) {
    detector.detect(procCanvas).then(function(results){
      if (results && results.length > 0) onCode(results[0].rawValue);
      rafId = requestAnimationFrame(scan);
    }).catch(function(){ rafId = requestAnimationFrame(scan); });
  } else if (useJsQR) {
    var imgData = pctx.getImageData(0, 0, w, h);
    var code = jsQR(imgData.data, w, h, { inversionAttempts: 'dontInvert' });
    if (code) onCode(code.data);
    rafId = requestAnimationFrame(scan);
  }
}

function onCode(text) {
  if (!text) return;
  var now = Date.now();
  // Дебаунс — същия код не се чете по-бързо от 1.5 сек
  if (text === lastCode && (now - lastTime) < 1500) return;
  lastCode = text; lastTime = now;

  // Мигане на рамката
  octx.strokeStyle = '#4caf50';
  octx.lineWidth = 3;
  var cx = overlayCanvas.width/2, cy = overlayCanvas.height/2;
  var bw = overlayCanvas.width*0.65, bh = overlayCanvas.height*0.55;
  octx.strokeRect(cx-bw/2, cy-bh/2, bw, bh);

  if (curSlot === 1 && !slot1) {
    slot1 = text; setSlot(1, text); curSlot = 2;
    document.getElementById('lbl').textContent = 'Сканирай Код 2';
    status('✓ Код 1 записан! Сканирай Код 2', 'ok');
    vib(100);
  } else if (curSlot === 2 && !slot2 && text !== slot1) {
    slot2 = text; setSlot(2, text);
    document.getElementById('lbl').textContent = '✓ Готово!';
    document.getElementById('btnSave').disabled = false;
    status('✓ И двата кода са готови! Натисни "Запиши двойката"', 'ok');
    vib([100,50,100]);
  }
}

function setSlot(n, val) {
  var el = document.getElementById('v'+n);
  el.textContent = val; el.classList.remove('empty');
  document.getElementById('s'+n).classList.add('ok');
}

function resetSlots() {
  slot1=null; slot2=null; curSlot=1; lastCode='';
  [1,2].forEach(function(n){
    var el=document.getElementById('v'+n);
    el.textContent='Очаква се...'; el.classList.add('empty');
    document.getElementById('s'+n).classList.remove('ok');
  });
  document.getElementById('btnSave').disabled = true;
  if (scanning) { document.getElementById('lbl').textContent='Сканирай Код 1'; status('Нулирано','info'); }
}

function savePair() {
  if (!slot1||!slot2) return;
  var now = new Date();
  var ts = now.toLocaleDateString('bg-BG')+' '+now.toLocaleTimeString('bg-BG');
  records.push({n:records.length+1, c1:slot1, c2:slot2, ts:ts});
  updateTable(); resetSlots();
  status('Двойката е записана!', 'ok');
}

function updateTable() {
  var badge=document.getElementById('cnt');
  var tbl=document.getElementById('tbl');
  var noRec=document.getElementById('noRec');
  badge.textContent = records.length;
  if (!records.length){ tbl.style.display='none'; noRec.style.display='block'; return; }
  noRec.style.display='none'; tbl.style.display='table';
  document.getElementById('tbody').innerHTML = records.slice().reverse().map(function(r){
    return '<tr><td>'+r.n+'</td><td>'+esc(r.c1)+'</td><td>'+esc(r.c2)+'</td><td>'+r.ts+'</td></tr>';
  }).join('');
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function dlCSV() {
  if (!records.length){ status('Няма записи','err'); return; }
  var bom='\uFEFF', hdr='#,Код 1,Код 2,Дата и час\n';
  var rows=records.map(function(r){
    return r.n+',"'+r.c1.replace(/"/g,'""')+'","'+r.c2.replace(/"/g,'""')+'","'+r.ts+'"';
  }).join('\n');
  var blob=new Blob([bom+hdr+rows],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='баркодове_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function clearAll() {
  if (!records.length) return;
  if (confirm('Изтрий всички '+records.length+' записа?')){ records=[]; updateTable(); }
}

function switchCam() {
  var id=document.getElementById('camSel').value;
  openStream(id);
}

function stopCam() {
  scanning=false;
  if (rafId) cancelAnimationFrame(rafId);
  if (video.srcObject) video.srcObject.getTracks().forEach(function(t){t.stop();});
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('dot').classList.remove('on');
  document.getElementById('lbl').textContent='Камерата е спряна';
  status('Камерата е спряна','info');
}

function vib(p){ if(navigator.vibrate) navigator.vibrate(p); }
</script>
</body>
</html>
